# Canonical ROI categories for the Allen32 atlas
# 32 ROIs (16 bilateral pairs) grouped into named anatomical categories
# Used by source-analytics when roi_categories is not specified in study config
#
# v0.2.0 (2026-04-25): four composite labels renamed for nomenclature accuracy.
# Historical identifiers (Prefrontal_mPFC, Striatum, Amygdala, Brainstem) are
# preserved in the deprecated_aliases block so derivatives generated before
# this rename remain readable. No region membership changes.

Frontal-Anterior:
  - Frontal_Anterior_L
  - Frontal_Anterior_R
Motor:
  - Motor_L
  - Motor_R
Somatosensory:
  - Somatosensory_L
  - Somatosensory_R
Auditory:
  - Auditory_L
  - Auditory_R
Visual/Parietal:
  - Visual_Parietal_L
  - Visual_Parietal_R
Lateral Cortex:
  - Lateral_Cortex_L
  - Lateral_Cortex_R
Retrosplenial:
  - Retrosplenial_L
  - Retrosplenial_R
Olfactory:
  - Olfactory_Bulb_L
  - Olfactory_Bulb_R
Hippocampal:
  - Hippocampus_Ant_L
  - Hippocampus_Ant_R
  - Hippocampus_Post_L
  - Hippocampus_Post_R
Deep Subcortical:
  - Thalamus_L
  - Thalamus_R
  - Hypothalamus_L
  - Hypothalamus_R
  - Amygdalar_Complex_L
  - Amygdalar_Complex_R
  - Basal_Ganglia_L
  - Basal_Ganglia_R
  - Brainstem_Tectum_L
  - Brainstem_Tectum_R
  - Cerebellum_L
  - Cerebellum_R

# Backward compatibility — map old identifiers to new canonical names.
# Loader-side code may consult this block to resolve historical CSVs / configs
# that reference the pre-v0.2.0 labels.
deprecated_aliases:
  # 32-ROI identifiers
  Prefrontal_mPFC_L: Frontal_Anterior_L
  Prefrontal_mPFC_R: Frontal_Anterior_R
  Striatum_L: Basal_Ganglia_L
  Striatum_R: Basal_Ganglia_R
  Amygdala_L: Amygdalar_Complex_L
  Amygdala_R: Amygdalar_Complex_R
  Brainstem_L: Brainstem_Tectum_L
  Brainstem_R: Brainstem_Tectum_R
  # 10-region category
  Prefrontal: Frontal-Anterior
